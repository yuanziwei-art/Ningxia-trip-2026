<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ningxia Trip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf8;color:#1a1a18;font-size:14px;line-height:1.5}
.shell{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}
.trip-title{font-size:20px;font-weight:500;margin-bottom:2px}
.trip-sub{font-size:13px;color:#888;margin-bottom:1rem}
.tabs{display:flex;border-bottom:1px solid #e5e3dc;margin-bottom:1.5rem}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border:none;border-bottom:2px solid transparent;color:#888;background:none}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:500}
.panel{display:none}.panel.active{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.dot{width:8px;height:8px;border-radius:50%}
.dot-transit{background:#2d7a3a}.dot-dine{background:#6b1a2e}.dot-wander{background:#b8860b}
.edit-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #e5e3dc;background:#fff;cursor:pointer;color:#555}
.edit-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.sync-bar{font-size:11px;color:#aaa;margin-bottom:1rem;min-height:16px;text-align:right}
.sync-ok{color:#2e7d32}.sync-err{color:#c62828}
.day-wrap{margin-bottom:10px;border:1px solid #e5e3dc;border-radius:12px;overflow:hidden;background:#fff}
.day-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:none;border:none;cursor:pointer;text-align:left}
.day-toggle:hover{background:#fafaf8}
.day-toggle-left{display:flex;align-items:baseline;gap:10px}
.day-date{font-size:16px;font-weight:500}
.day-dow{font-size:12px;color:#aaa}
.chevron{font-size:11px;color:#aaa;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.day-body{border-top:1px solid #f0ede6;padding:12px}
.tl-grid{display:grid;grid-template-columns:52px 16px 1fr}
.tl-time{display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;font-size:10px;color:#ccc;padding-top:2px}
.tl-time.hour{color:#aaa;font-size:11px}
.tl-spine{display:flex;flex-direction:column;align-items:center}
.tl-node{width:7px;height:7px;border-radius:50%;background:#ece9e3;margin-top:3px;flex-shrink:0}
.tl-node.transit{background:#2d7a3a}.tl-node.dine{background:#6b1a2e}.tl-node.wander{background:#b8860b}
.tl-line{width:1px;background:#f0ede6;flex:1}
.tl-cell{padding-left:6px;position:relative}
.tl-act{position:absolute;left:6px;right:0;border-radius:7px;padding:5px 9px;border-left:3px solid;z-index:1}
.tl-act.transit{background:#eaf7ed;border-color:#2d7a3a}
.tl-act.dine{background:#fceef2;border-color:#6b1a2e}
.tl-act.wander{background:#fefce8;border-color:#b8860b}
.tl-act.editable{cursor:pointer}.tl-act.editable:hover{filter:brightness(.96)}
.act-name{font-size:12px;font-weight:500;line-height:1.3}
.act-meta{font-size:10px;color:#aaa;margin-top:2px}
.confirmed{color:#2e7d32}.proposed{color:#b8860b}.optional{color:#bbb;font-style:italic}
.hotel-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding:8px 10px;background:#fffbf0;border-radius:8px;border-left:3px solid #c8a84b}
.add-act-btn{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;font-size:12px;color:#aaa;border:1px dashed #ddd;border-radius:8px;background:none;cursor:pointer;width:100%}
.add-act-btn:hover{color:#555;border-color:#aaa}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;width:90%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px}
.mfield{margin-bottom:12px}
.mfield label{display:block;font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:8px 10px;border:1px solid #e5e3dc;border-radius:8px;font-size:13px;background:#fafaf8;color:#1a1a18;outline:none;font-family:inherit}
.mfield textarea{resize:vertical;min-height:60px}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:#888}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.mbtn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.mbtn-save{background:#1a1a18;color:#fff;border:none;margin-left:auto}
.mbtn-del{background:none;border:1px solid #f0c0c0;color:#c62828}
.mbtn-cancel{background:none;border:1px solid #e5e3dc;color:#555}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#e5e3dc;transition:background .15s}
.pin-dot.filled{background:#1a1a18}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pin-key{padding:14px;font-size:18px;font-weight:500;border:1px solid #e5e3dc;border-radius:10px;background:#fff;cursor:pointer;text-align:center}
.pin-key:hover{background:#fafaf8}
.pin-err{color:#c62828;font-size:12px;text-align:center;min-height:18px;margin-top:4px}
.exp-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.sum-card{background:#fff;border:1px solid #e5e3dc;border-radius:10px;padding:12px 14px}
.sum-label{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.sum-val{font-size:18px;font-weight:500}
.add-exp{background:#fff;border:1px solid #e5e3dc;border-radius:10px;padding:14px 16px;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field label{display:block;font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.field input,.field select{width:100%;padding:7px 10px;border:1px solid #e5e3dc;border-radius:7px;font-size:13px;background:#fafaf8;color:#1a1a18;outline:none}
.exp-list{background:#fff;border:1px solid #e5e3dc;border-radius:10px;overflow:hidden;margin-bottom:1rem}
.exp-row{display:grid;grid-template-columns:1fr 80px 70px 28px;align-items:center;padding:10px 14px;border-bottom:1px solid #f0ede6;font-size:13px}
.exp-row:last-child{border-bottom:none}
.exp-head{background:#fafaf8;font-size:11px;color:#aaa;text-transform:uppercase;font-weight:400}
.del-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:16px;padding:0}
.del-btn:hover{color:#e24b4a}
.btn-add{background:#1a1a18;color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:500}
.btn-row{display:flex;justify-content:flex-end;margin-top:4px}
.balance-bar{background:#fff;border:1px solid #e5e3dc;border-radius:10px;padding:14px 16px}
.bal-section{margin-bottom:14px}.bal-section:last-child{margin-bottom:0}
.bal-currency{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.bal-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f5f3ee}
.bal-row:last-child{border-bottom:none;font-weight:500;padding-top:6px}
.bal-pos{color:#2e7d32;font-weight:500}.bal-neg{color:#c62828;font-weight:500}
.pack-section{margin-bottom:1.5rem}
.pack-title{font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px}
.pack-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border:1px solid #e5e3dc;border-radius:8px;font-size:13px;cursor:pointer;user-select:none}
.pack-item.checked{color:#bbb;text-decoration:line-through;background:#fafaf8}
.pack-item input[type=checkbox]{accent-color:#2d7a3a;width:14px;height:14px;flex-shrink:0}
.loading{text-align:center;color:#aaa;padding:2rem;font-size:13px}
</style>
</head>
<body>
<div class="shell">
  <div class="trip-title">Ningxia Wine Trip 🍷</div>
  <div class="trip-sub">16–18 July 2026 · Ziwei & PJ</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('itinerary',event)">Itinerary</button>
    <button class="tab" onclick="showTab('expenses',event)">Expenses</button>

  </div>

  <div id="itinerary" class="panel active">
    <div class="top-bar">
      <div class="legend">
        <div class="leg-item"><div class="dot dot-transit"></div>On Track</div>
        <div class="leg-item"><div class="dot dot-dine"></div>Vine & Dine</div>
        <div class="leg-item"><div class="dot dot-wander"></div>Wander</div>
      </div>
      <button class="edit-btn" id="edit-toggle" onclick="toggleEditMode()">✏️ Edit</button>
    </div>
    <div class="sync-bar" id="itin-sync"></div>
    <div id="days-container"><div class="loading">Loading itinerary…</div></div>
  </div>

  <div id="expenses" class="panel">
    <div class="sync-bar" id="exp-sync"></div>
    <div class="exp-summary" id="exp-summary"></div>
    <div class="add-exp">
      <div class="form-row">
        <div class="field"><label>Description</label><input id="e-desc" placeholder="e.g. Winery tasting"></div>
        <div class="field"><label>Paid by</label>
          <select id="e-who"><option value="Ziwei">Ziwei</option><option value="PJ">PJ</option><option value="split">Split evenly</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Currency</label>
          <select id="e-cur" onchange="updateCurLabel()"><option value="HKD">HKD (HK$)</option><option value="CNY">CNY (¥)</option></select>
        </div>
        <div class="field"><label id="amt-label">Amount (HK$)</label><input id="e-amt" type="number" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Category</label>
          <select id="e-cat"><option value="transit">On Track</option><option value="dine">Vine & Dine</option><option value="wander">Wander</option><option value="other">Other</option></select>
        </div>
        <div class="field"><label>Day</label>
          <select id="e-day"><option value="1">Day 1 — 16 Jul</option><option value="2">Day 2 — 17 Jul</option><option value="3">Day 3 — 18 Jul</option></select>
        </div>
      </div>
      <div class="btn-row"><button class="btn-add" onclick="addExpense()">Add expense</button></div>
    </div>
    <div class="exp-list">
      <div class="exp-row exp-head"><div>Description</div><div style="text-align:right">Amount</div><div style="text-align:center">Paid by</div><div></div></div>
      <div id="exp-rows"><div class="loading">Loading expenses…</div></div>
    </div>
    <div class="balance-bar" id="balance-bar"></div>
  </div>


</div>

<!-- PIN modal -->
<div class="modal-bg" id="pin-modal">
  <div class="modal">
    <div class="modal-title" style="text-align:center">Enter PIN to edit</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinKey('back')" style="font-size:14px">←</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key" onclick="closePinModal()" style="font-size:12px;color:#aaa">✕</button>
    </div>
  </div>
</div>

<!-- Activity modal -->
<div class="modal-bg" id="act-modal">
  <div class="modal">
    <div class="modal-title" id="act-modal-title">Edit activity</div>
    <div class="mrow">
      <div class="mfield"><label>Start time</label><select id="m-start"></select></div>
      <div class="mfield"><label>End time</label><select id="m-end"></select></div>
    </div>
    <div class="mfield"><label>Activity</label><input id="m-name" placeholder="Tour & tasting at..."></div>
    <div class="mfield"><label>Chinese name (optional)</label><input id="m-cn" placeholder="中文名称"></div>
    <div class="mrow">
      <div class="mfield"><label>Type</label>
        <select id="m-type"><option value="transit">On Track</option><option value="dine">Vine & Dine</option><option value="wander">Wander</option></select>
      </div>
      <div class="mfield"><label>Status</label>
        <select id="m-status"><option value="proposed">◎ Proposed</option><option value="confirmed">✓ Confirmed</option><option value="optional">○ Optional</option></select>
      </div>
    </div>
    <div class="mfield"><label>Notes</label><textarea id="m-notes" placeholder="Booking info, reminders..."></textarea></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-del" id="m-del-btn" onclick="deleteAct()">Delete</button>
      <button class="mbtn mbtn-cancel" onclick="closeActModal()">Cancel</button>
      <button class="mbtn mbtn-save" onclick="saveAct()">Save</button>
    </div>
  </div>
</div>

<script>
var SLOT_H = 28, DAY_START = 8, DAY_END = 23, PIN = '0102';
var editMode = false, pinBuffer = '', editingDay = null, editingIdx = null;
var expenses = [];
var expanded = {1:true, 2:false, 3:false};
var packChecked = {};
var ITIN_KEY = 'nx_itinerary', EXP_KEY = 'nx_expenses', PACK_KEY = 'nx_packing_local';
var syncTimer = null;

var DEFAULT_ITIN = {
  1:{date:"16 Jul",dow:"Thursday",day:"Day 1",hotel:{name:"JW Marriott Yinchuan",status:"proposed"},acts:[
    {start:"10:00",end:"13:00",name:"Transit HK → Shenzhen airport",cn:"",type:"transit",status:"proposed",notes:"Mode TBD"},
    {start:"13:30",end:"16:45",name:"Flight MF8221 · SZX → INC",cn:"",type:"transit",status:"confirmed",notes:"Xiamen Air"},
    {start:"16:45",end:"18:00",name:"Transfer to hotel",cn:"",type:"transit",status:"proposed",notes:"JW Marriott"},
    {start:"18:00",end:"19:30",name:"Lamb dinner TBD",cn:"",type:"dine",status:"proposed",notes:"Local restaurant"},
    {start:"20:00",end:"22:00",name:"Wine bar at Puren",cn:"蒲人酒舍",type:"dine",status:"proposed",notes:""}
  ]},
  2:{date:"17 Jul",dow:"Friday",day:"Day 2",hotel:{name:"JW Marriott Yinchuan",status:"proposed"},acts:[
    {start:"09:00",end:"09:30",name:"Car pick-up",cn:"",type:"transit",status:"proposed",notes:"To be booked"},
    {start:"10:00",end:"11:00",name:"Tour & tasting at Silver Heights",cn:"银色高地",type:"dine",status:"proposed",notes:"Book via WeChat"},
    {start:"11:00",end:"11:30",name:"Optional free tour at Yuanshi",cn:"源石酒庄",type:"dine",status:"optional",notes:"Optional"},
    {start:"12:00",end:"14:00",name:"Lunch TBD",cn:"",type:"dine",status:"proposed",notes:"Near Helan area, before Jade Winery"},
    {start:"14:00",end:"15:30",name:"Tour & tasting at Jade Winery",cn:"",type:"dine",status:"proposed",notes:"High-end flight Fri only · call to reserve"},
    {start:"15:30",end:"16:00",name:"Drive back to city centre",cn:"",type:"transit",status:"proposed",notes:""},
    {start:"16:00",end:"18:00",name:"Optional visit, Ningxia Museum",cn:"宁夏博物馆",type:"wander",status:"optional",notes:"Confirm closing time · pre-book via WeChat"},
    {start:"18:00",end:"21:00",name:"Night market dinner",cn:"怀远夜市",type:"dine",status:"proposed",notes:""}
  ]},
  3:{date:"18 Jul",dow:"Saturday",day:"Day 3",hotel:{name:"JW Marriott Yinchuan",status:"proposed"},acts:[
    {start:"08:30",end:"12:00",name:"Western Xia Imperial Tombs",cn:"西夏陵",type:"wander",status:"proposed",notes:"UNESCO site · mostly outdoor · allow 3–4 hrs"},
    {start:"12:00",end:"14:00",name:"Lunch TBD",cn:"",type:"dine",status:"proposed",notes:"Back to city centre"},
    {start:"14:30",end:"16:00",name:"Tour & tasting at Helan Qingxue",cn:"贺兰晴雪",type:"dine",status:"proposed",notes:"Book in advance"},
    {start:"16:00",end:"18:00",name:"Optional — city tour or one last winery",cn:"",type:"wander",status:"optional",notes:"TBD · 海悦仁和 or other"}
  ]}
};

var itinerary = JSON.parse(JSON.stringify(DEFAULT_ITIN));



// ── STORAGE ──
function setSyncStatus(elId, msg, cls) {
  var el = document.getElementById(elId);
  if (el) { el.textContent = msg; el.className = 'sync-bar ' + (cls||''); }
}

function saveShared(key, data, syncElId) {
  setSyncStatus(syncElId, 'Saving…', '');
  window.storage.set(key, JSON.stringify(data), true).then(function(r) {
    if (r) setSyncStatus(syncElId, '✓ Saved & synced', 'sync-ok');
    else setSyncStatus(syncElId, '⚠ Save failed', 'sync-err');
    setTimeout(function(){ setSyncStatus(syncElId, '', ''); }, 3000);
  }).catch(function() {
    setSyncStatus(syncElId, '⚠ Save failed', 'sync-err');
    setTimeout(function(){ setSyncStatus(syncElId, '', ''); }, 3000);
  });
}

function loadShared(key, fallback, cb) {
  window.storage.get(key, true).then(function(r) {
    cb(r ? JSON.parse(r.value) : fallback);
  }).catch(function() { cb(fallback); });
}

function saveLocal(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

function loadLocal(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}

function init() {
  loadShared(ITIN_KEY, null, function(data) {
    if (data) itinerary = data;
    else itinerary = JSON.parse(JSON.stringify(DEFAULT_ITIN));
    renderItinerary();
  });
  loadShared(EXP_KEY, [], function(data) {
    expenses = data || [];
    renderExpenses();
  });

  setInterval(function() {
    loadShared(ITIN_KEY, null, function(data) {
      if (!editMode && data) { itinerary = data; renderItinerary(); }
    });
    loadShared(EXP_KEY, [], function(data) {
      expenses = data || []; renderExpenses();
    });
  }, 15000);
}

// ── SLOTS ──
function pad(n) { return String(n).padStart(2,'0'); }
function genSlots() {
  var s = [];
  for (var h = DAY_START; h < DAY_END; h++) { s.push(pad(h)+':00'); s.push(pad(h)+':30'); }
  return s;
}
var SLOTS = genSlots();

function timeToIdx(t) {
  if (!t) return -1;
  var p = t.split(':'); return (parseInt(p[0],10)-DAY_START)*2+(parseInt(p[1],10)>=30?1:0);
}

function buildTimeSelect(selId, val) {
  var sel = document.getElementById(selId); sel.innerHTML = '';
  for (var h = DAY_START; h <= DAY_END; h++) {
    var mins = ['00','30'];
    for (var mi = 0; mi < mins.length; mi++) {
      if (h === DAY_END && mins[mi] === '30') continue;
      var v = pad(h)+':'+mins[mi];
      var opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      if (v === val) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

// ── TABS ──
function showTab(t, e) {
  var tabs = document.querySelectorAll('.tab');
  for (var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  var panels = document.querySelectorAll('.panel');
  for (var i=0;i<panels.length;i++) panels[i].classList.remove('active');
  e.target.classList.add('active');
  document.getElementById(t).classList.add('active');
}

// ── PIN ──
function toggleEditMode() {
  if (editMode) { exitEdit(); return; }
  pinBuffer = ''; updatePinDots();
  document.getElementById('pin-err').textContent = '';
  document.getElementById('pin-modal').classList.add('show');
}
function pinKey(k) {
  if (k==='back') { pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); return; }
  if (pinBuffer.length>=4) return;
  pinBuffer+=k; updatePinDots();
  if (pinBuffer.length===4) {
    if (pinBuffer===PIN) {
      document.getElementById('pin-modal').classList.remove('show');
      editMode=true;
      var btn=document.getElementById('edit-toggle');
      btn.classList.add('active'); btn.textContent='🔒 Lock';
      renderItinerary();
    } else {
      document.getElementById('pin-err').textContent='Incorrect PIN';
      pinBuffer=''; updatePinDots();
    }
  }
}
function updatePinDots() {
  for (var i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
}
function closePinModal() { document.getElementById('pin-modal').classList.remove('show'); }
function exitEdit() {
  editMode=false;
  var btn=document.getElementById('edit-toggle');
  btn.classList.remove('active'); btn.textContent='✏️ Edit';
  renderItinerary();
}

// ── ITINERARY ──
function toggleDay(d) { expanded[d]=!expanded[d]; renderItinerary(); }

function renderDay(d) {
  var data=itinerary[d], acts=data.acts, isOpen=expanded[d];
  var slotActs=[];
  for (var i=0;i<SLOTS.length;i++) slotActs.push(null);
  for (var ai=0;ai<acts.length;ai++) {
    var act=acts[ai];
    var si=Math.max(0,timeToIdx(act.start));
    var ei=Math.min(SLOTS.length,act.end?timeToIdx(act.end):si+1);
    for (var i=si;i<ei;i++) if (slotActs[i]===null) slotActs[i]=ai;
  }
  var rows='';
  for (var i=0;i<SLOTS.length;i++) {
    var slot=SLOTS[i], p=slot.split(':'), h=parseInt(p[0],10), m=parseInt(p[1],10);
    var isHour=m===0, actIdx=slotActs[i], act=actIdx!==null?acts[actIdx]:null;
    var isStart=act!==null&&timeToIdx(act.start)===i;
    var nodeType=act?act.type:'empty';
    var timeLabel=isHour?pad(h)+':00':'';
    var spanSlots=act?Math.max(1,timeToIdx(act.end)-timeToIdx(act.start)):1;
    var spanPx=spanSlots*SLOT_H;
    rows+='<div class="tl-time'+(isHour?' hour':'')+'" style="height:'+SLOT_H+'px">'+timeLabel+'</div>';
    rows+='<div class="tl-spine" style="height:'+SLOT_H+'px"><div class="tl-node '+nodeType+'"></div><div class="tl-line"></div></div>';
    if (isStart) {
      var sc=act.status==='confirmed'?'confirmed':act.status==='optional'?'optional':'proposed';
      var si2=act.status==='confirmed'?'✓':act.status==='optional'?'○':'◎';
      var clickAttr=editMode?' onclick="openEditAct('+d+','+actIdx+')"':'';
      var metaHTML=spanPx>=44?'<div class="act-meta"><span class="'+sc+'">'+si2+' '+act.status+'</span>'+(act.notes?' · '+act.notes:'')+'</div>':'<div class="act-meta"><span class="'+sc+'">'+si2+'</span></div>';
      rows+='<div class="tl-cell" style="height:'+SLOT_H+'px"><div class="tl-act '+act.type+(editMode?' editable':'')+'" style="top:2px;height:'+(spanPx-4)+'px;min-height:22px"'+clickAttr+'>';
      rows+='<div class="act-name">'+act.name+(act.cn?' <span style="font-weight:400;color:#aaa;font-size:10px">'+act.cn+'</span>':'')+'</div>'+metaHTML+'</div></div>';
    } else {
      rows+='<div class="tl-cell" style="height:'+SLOT_H+'px"></div>';
    }
  }
  var hotelClick=editMode?' onclick="openEditHotel('+d+')" style="cursor:pointer"':'';
  var addBtn=editMode?'<button class="add-act-btn" onclick="openAddAct('+d+')">+ Add activity</button>':'';
  return '<div class="day-wrap">'+
    '<button class="day-toggle" onclick="toggleDay('+d+')">'+
    '<div class="day-toggle-left"><span class="day-date">'+data.date+'</span><span class="day-dow">'+data.dow+' · '+data.day+'</span></div>'+
    '<span class="chevron '+(isOpen?'open':'')+'">▼</span></button>'+
    '<div class="day-body"'+(isOpen?'':' style="display:none"')+'>'+
    '<div class="tl-grid">'+rows+'</div>'+
    '<div class="hotel-row"'+hotelClick+'><div><div class="act-name">🏨 '+data.hotel.name+'</div><div class="act-meta proposed">◎ '+data.hotel.status+' · all 3 nights</div></div></div>'+
    addBtn+'</div></div>';
}

function renderItinerary() {
  var html='', days=Object.keys(itinerary);
  for (var i=0;i<days.length;i++) html+=renderDay(Number(days[i]));
  document.getElementById('days-container').innerHTML=html;
}

// ── ACT MODAL ──
function openEditAct(d,idx) {
  editingDay=d; editingIdx=idx;
  var act=itinerary[d].acts[idx];
  document.getElementById('act-modal-title').textContent='Edit activity';
  buildTimeSelect('m-start',act.start||'09:00');
  buildTimeSelect('m-end',act.end||'10:00');
  document.getElementById('m-name').value=act.name||'';
  document.getElementById('m-cn').value=act.cn||'';
  document.getElementById('m-type').value=act.type||'dine';
  document.getElementById('m-status').value=act.status||'proposed';
  document.getElementById('m-notes').value=act.notes||'';
  document.getElementById('m-del-btn').style.display='';
  document.getElementById('act-modal').classList.add('show');
}
function openAddAct(d) {
  editingDay=d; editingIdx=null;
  document.getElementById('act-modal-title').textContent='Add activity';
  buildTimeSelect('m-start','09:00'); buildTimeSelect('m-end','10:00');
  document.getElementById('m-name').value=''; document.getElementById('m-cn').value='';
  document.getElementById('m-type').value='dine'; document.getElementById('m-status').value='proposed';
  document.getElementById('m-notes').value='';
  document.getElementById('m-del-btn').style.display='none';
  document.getElementById('act-modal').classList.add('show');
}
function openEditHotel(d) {
  editingDay=d; editingIdx='hotel';
  var h=itinerary[d].hotel;
  document.getElementById('act-modal-title').textContent='Edit hotel';
  buildTimeSelect('m-start','09:00'); buildTimeSelect('m-end','10:00');
  document.getElementById('m-name').value=h.name||'';
  document.getElementById('m-cn').value='';
  document.getElementById('m-type').value='wander';
  document.getElementById('m-status').value=h.status||'proposed';
  document.getElementById('m-notes').value='';
  document.getElementById('m-del-btn').style.display='none';
  document.getElementById('act-modal').classList.add('show');
}
function saveAct() {
  var d=editingDay;
  if (editingIdx==='hotel') {
    var n=document.getElementById('m-name').value.trim();
    if (n) itinerary[d].hotel.name=n;
    itinerary[d].hotel.status=document.getElementById('m-status').value;
  } else {
    var n=document.getElementById('m-name').value.trim();
    if (!n) { alert('Activity name required'); return; }
    var obj={start:document.getElementById('m-start').value,end:document.getElementById('m-end').value,
      name:n,cn:document.getElementById('m-cn').value.trim(),type:document.getElementById('m-type').value,
      status:document.getElementById('m-status').value,notes:document.getElementById('m-notes').value.trim()};
    if (editingIdx===null) itinerary[d].acts.push(obj);
    else itinerary[d].acts[editingIdx]=obj;
    itinerary[d].acts.sort(function(a,b){return timeToIdx(a.start)-timeToIdx(b.start);});
  }
  closeActModal(); renderItinerary();
  saveShared(ITIN_KEY, itinerary, 'itin-sync');
}
function deleteAct() {
  if (editingIdx===null||editingIdx==='hotel') return;
  itinerary[editingDay].acts.splice(editingIdx,1);
  closeActModal(); renderItinerary();
  saveShared(ITIN_KEY, itinerary, 'itin-sync');
}
function closeActModal() { document.getElementById('act-modal').classList.remove('show'); }

// ── EXPENSES ──
function updateCurLabel() {
  var cur=document.getElementById('e-cur').value;
  document.getElementById('amt-label').textContent='Amount ('+(cur==='HKD'?'HK$':'¥')+')';
}
function addExpense() {
  var desc=document.getElementById('e-desc').value.trim();
  var amt=parseFloat(document.getElementById('e-amt').value);
  if (!desc||isNaN(amt)) { alert('Please enter a description and amount.'); return; }
  expenses.push({desc:desc,amt:amt,cur:document.getElementById('e-cur').value,
    who:document.getElementById('e-who').value,cat:document.getElementById('e-cat').value,
    day:document.getElementById('e-day').value});
  document.getElementById('e-desc').value=''; document.getElementById('e-amt').value='';
  renderExpenses();
  saveShared(EXP_KEY, expenses, 'exp-sync');
}
function delExp(i) {
  expenses.splice(i,1); renderExpenses();
  saveShared(EXP_KEY, expenses, 'exp-sync');
}
function renderExpenses() {
  var rows=document.getElementById('exp-rows');
  if (!expenses.length) {
    rows.innerHTML='<div style="text-align:center;padding:20px;color:#bbb;font-style:italic">No expenses yet</div>';
  } else {
    var html='';
    for (var i=0;i<expenses.length;i++) {
      var e=expenses[i], sym=e.cur==='HKD'?'HK$':'¥';
      html+='<div class="exp-row"><div><div style="font-weight:500">'+e.desc+'</div><div style="font-size:11px;color:#aaa">Day '+e.day+'</div></div>';
      html+='<div style="text-align:right;font-weight:500">'+sym+e.amt.toFixed(0)+'</div>';
      html+='<div style="text-align:center;font-size:11px;color:#888">'+e.who+'</div>';
      html+='<button class="del-btn" onclick="delExp('+i+')">×</button></div>';
    }
    rows.innerHTML=html;
  }
  function calcT(list) {
    var total=0,zP=0,pP=0;
    for (var i=0;i<list.length;i++) {
      var e=list[i]; total+=e.amt;
      if (e.who==='Ziwei') zP+=e.amt;
      else if (e.who==='PJ') pP+=e.amt;
      else { zP+=e.amt/2; pP+=e.amt/2; }
    }
    return {total:total,zPaid:zP,pPaid:pP,half:total/2,zOwes:total/2-zP};
  }
  var hL=expenses.filter(function(e){return e.cur==='HKD';}), cL=expenses.filter(function(e){return e.cur==='CNY';});
  var hkd=calcT(hL), cny=calcT(cL);
  function sumV(ha,ca) {
    var h='';
    if (hL.length) h+='<div class="sum-val">HK$'+Math.round(ha).toLocaleString()+'</div>';
    if (cL.length) h+='<div class="sum-val">¥'+Math.round(ca).toLocaleString()+'</div>';
    if (!hL.length&&!cL.length) h='<div class="sum-val">—</div>';
    return h;
  }
  document.getElementById('exp-summary').innerHTML=
    '<div class="sum-card"><div class="sum-label">Total spent</div>'+sumV(hkd.total,cny.total)+'</div>'+
    '<div class="sum-card"><div class="sum-label">Each owes</div>'+sumV(hkd.half,cny.half)+'</div>'+
    '<div class="sum-card"><div class="sum-label">Ziwei paid</div>'+sumV(hkd.zPaid,cny.zPaid)+'</div>'+
    '<div class="sum-card"><div class="sum-label">PJ paid</div>'+sumV(hkd.pPaid,cny.pPaid)+'</div>';
  function sec(t,sym,lbl) {
    if (!t.total) return '';
    var dir=t.zOwes>0?'Ziwei owes PJ':t.zOwes<0?'PJ owes Ziwei':'All settled up';
    var cls=t.zOwes>0?'bal-neg':'bal-pos';
    var amt=t.zOwes!==0?sym+Math.round(Math.abs(t.zOwes)).toLocaleString():'✓';
    return '<div class="bal-section"><div class="bal-currency">'+lbl+'</div>'+
      '<div class="bal-row"><div style="color:#555">Ziwei paid</div><div>'+sym+Math.round(t.zPaid).toLocaleString()+'</div></div>'+
      '<div class="bal-row"><div style="color:#555">PJ paid</div><div>'+sym+Math.round(t.pPaid).toLocaleString()+'</div></div>'+
      '<div class="bal-row"><div style="color:#555">'+dir+'</div><div class="'+cls+'">'+amt+'</div></div></div>';
  }
  var sh=sec(hkd,'HK$','Hong Kong Dollar (HKD)')+sec(cny,'¥','Chinese Yuan (CNY)');
  document.getElementById('balance-bar').innerHTML=
    '<div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Settlement</div>'+
    (sh||'<div style="color:#bbb;font-size:13px;text-align:center;padding:8px 0">No expenses yet</div>');
}

// ── PACKING (local only) ──
function renderPacking() {
  var cats=Object.keys(PACKING), html='';
  for (var ci=0;ci<cats.length;ci++) {
    var cat=cats[ci], items=PACKING[cat];
    html+='<div class="pack-section"><div class="pack-title">'+cat+'</div><div class="pack-grid">';
    for (var ii=0;ii<items.length;ii++) {
      var id='pk'+ci+'_'+ii, checked=packChecked[id]||false;
      html+='<label class="pack-item'+(checked?' checked':'')+'" id="lbl'+id+'">'+
        '<input type="checkbox"'+(checked?' checked':'')+' onchange="togglePack(\''+id+'\',this.checked)">'+items[ii]+'</label>';
    }
    html+='</div></div>';
  }
  document.getElementById('pack-container').innerHTML=html;
}
function togglePack(id, checked) {
  packChecked[id]=checked;
  document.getElementById('lbl'+id).classList.toggle('checked',checked);
  saveLocal(PACK_KEY, packChecked);
}

init();
</script>
